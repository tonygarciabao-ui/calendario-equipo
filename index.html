<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#2C2E38;--surf:#363840;--surf2:#2C2E38;
  --day-bg:#3A3C46;--day-hol:#1E3028;
  --border:#484A56;--border2:#565860;
  --ink:#F5F4F2;--ink2:#C8C6CC;--ink3:#8A8890;
  --r:10px;--rs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.25),0 4px 12px rgba(0,0,0,.2);
  --hol-bg:#1E3028;--hol-ink:#4ADE96;
  --wknd-bg:#3C3E4A;
  --lib-color:#F59E0B;--lib-light:#7A4E08;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px}
button{font-family:inherit;cursor:pointer}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Top nav */
.topnav{background:#1A1D2E;display:flex;align-items:center;padding:0 20px;height:50px;flex-shrink:0;border-bottom:2px solid #6366F1}
.brand{display:flex;align-items:center;gap:10px;margin-right:24px;white-space:nowrap;text-decoration:none}
.brand-circles{display:flex;align-items:center}
.brand-circle{width:20px;height:20px;border-radius:50%;border:2px solid #1A1D2E;margin-left:-6px;flex-shrink:0}
.brand-circle:first-child{margin-left:0}
.brand-text{display:flex;flex-direction:column;line-height:1}
.brand-text strong{font-size:16px;font-weight:800;color:#fff;letter-spacing:-1px;text-transform:uppercase}
.brand-text span{font-size:10px;font-weight:500;color:#10B981;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:5px 14px;border-radius:var(--rs);border:none;background:none;color:#D8DCE8;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:#FFF;background:rgba(255,255,255,.1)}
.nav-tab.active{background:#6366F1;color:#FFF;font-weight:600}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.year-nav{display:flex;align-items:center;gap:6px}
.year-nav button{background:#2A2D42;border:1px solid #6366F1;border-radius:6px;width:24px;height:24px;color:#FFF;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.year-nav button:hover{background:#6366F1}
.year-lbl{font-family:'DM Mono',monospace;font-size:17px;font-weight:700;color:#FFF;min-width:44px;text-align:center;letter-spacing:1px}
.zoom-ctrl{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;border:1px solid #686A80;background:#2A2D42}
.zoom-ctrl button{background:none;border:none;color:#D8DCE8;font-size:14px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;transition:color .15s;border-radius:3px}
.zoom-ctrl button:hover{color:#FFF;background:rgba(255,255,255,.1)}
.zoom-pct{font-family:'DM Mono',monospace;font-size:11px;color:#D8DCE8;min-width:32px;text-align:center}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid #686A80;color:#D8DCE8;transition:all .3s}
.sync-badge.syncing{color:#f59e0b;border-color:#f59e0b44}
.sync-badge.synced{color:#10b981;border-color:#10b98144}
.sync-badge.error{color:#ef4444;border-color:#ef444444}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.sync-badge.syncing .sync-dot{animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Hint bar */
.hintbar{background:#363840;border-bottom:1px solid var(--border);padding:6px 22px;font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:32px}

/* Body */
.body{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:210px;flex-shrink:0;background:#2A2C36;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:14px 12px 18px;gap:18px}
.sb-ttl{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#FFF;margin-bottom:7px}
.plist{display:flex;flex-direction:column;gap:3px}
.prow{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:var(--rs);border:1px solid transparent;cursor:pointer;transition:all .15s;user-select:none}
.prow:hover{background:var(--surf2)}
.prow.active{border-color:var(--border);background:var(--surf2)}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.pname{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#F5F4F2}
.pcnt{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:#C8C6CC;white-space:nowrap}
.mpills{display:flex;gap:3px;margin-top:2px;padding:0 7px 4px;flex-wrap:wrap}
.mpill{flex:1;font-size:9px;font-weight:600;padding:4px 0;border-radius:4px;border:1px solid var(--border);background:var(--surf);color:#C8C6CC;text-align:center;cursor:pointer;transition:all .15s;white-space:nowrap}
.mpill:hover{background:var(--surf2)}
.mpill.on{color:#fff}

/* Summary cards */
.scards{display:flex;flex-direction:column;gap:5px}
.scard{background:#30323C;border-radius:var(--rs);padding:8px 9px 7px}
.scard-name{font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:5px;color:#F5F4F2}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.srows{display:flex;gap:4px;flex-wrap:wrap}
.sstat{flex:1;text-align:center;min-width:40px}
.sval{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;line-height:1}
.slbl{font-size:9px;font-weight:600;color:#C8C6CC;margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.sval.warn{color:#ef4444}
.sval.ok{color:#10b981}

/* Main */
.main{flex:1;overflow-y:auto;padding:20px 24px}
.cal-zoom-wrap{transform-origin:top left;transition:transform .2s}
.cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.mcard{background:var(--surf);border:1px solid #484A56;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.mttl{padding:8px 11px;font-size:15px;font-weight:600;border-bottom:1px solid #484A56;display:flex;justify-content:space-between;align-items:center;background:#363840}
.mmeta{font-size:10px;font-weight:400;color:var(--ink3);font-family:'DM Mono',monospace}
.dnames{display:grid;grid-template-columns:repeat(7,1fr);background:#2A2C36;border-bottom:1px solid #484A56}
.dn{font-size:9px;font-weight:600;text-align:center;padding:4px 0;color:var(--ink3)}
.dn.we{color:var(--border2)}
.dgrid{display:grid;grid-template-columns:repeat(7,1fr)}
.day{min-height:70px;padding:5px 2px 4px;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid #484A56;border-right:1px solid #484A56;cursor:pointer;transition:filter .1s;gap:2px;user-select:none;position:relative;background:var(--day-bg)}
.day:nth-child(7n){border-right:none}
.day.out{opacity:.15;pointer-events:none;background:var(--surf2)}
.day.we{background:#3C3E4A}
.day.hol{background:var(--day-hol)}
.day:hover:not(.out){filter:brightness(.88)}
.dnum{font-size:15px;font-weight:700;color:#FFF;line-height:1}
.hlbl{font-size:11px;color:#FFF;text-align:center;line-height:1.2;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:600}
.badges{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;padding:0 2px}
.badge{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.badge.vac{border-radius:50%}
.badge.guard{border-radius:3px;transform:rotate(45deg)}
.badge.guard span{display:inline-block;transform:rotate(-45deg)}
/* Libranza: pentagon-like — rounded square, distinct */
.badge.lib{border-radius:6px;border:2px solid rgba(255,255,255,.4)}

/* Config */
.cfg-wrap{display:flex;flex-direction:column;gap:18px;max-width:900px}
.cfg-row{display:grid;grid-template-columns:3fr 2fr;gap:18px;align-items:start}
.ccard{background:#2A2C36;border:1px solid #484A56;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.ccard-hdr{padding:10px 15px;border-bottom:1px solid #484A56;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.ccard-meta{font-size:11px;font-weight:400;color:var(--ink3)}
.ccard-body{padding:14px;display:flex;flex-direction:column;gap:10px}
.cfg-prow{display:flex;align-items:center;gap:9px;padding:7px 9px;background:#30323C;border-radius:var(--rs)}
.cfg-prow .av{width:28px;height:28px;font-size:10px}
.name-inp{font-family:'DM Sans',sans-serif;font-size:13px;padding:5px 8px;border:1px solid #484A56;border-radius:var(--rs);background:#30323C;color:var(--ink);flex:1}
.name-inp:focus{outline:none;border-color:var(--ink2)}
.del-btn{background:none;border:1px solid var(--border);border-radius:var(--rs);width:26px;height:26px;color:var(--ink3);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.del-btn:hover{border-color:#e8446a;color:#e8446a;background:#3a1a1a}
.add-form{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.add-form input[type=text]{font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 9px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surf);color:var(--ink);flex:1;min-width:100px}
.add-form input:focus,.cfg-inp:focus{outline:none;border-color:var(--ink2)}
.swatches{display:flex;gap:4px;flex-wrap:wrap}
.sw{width:19px;height:19px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.sw:hover{transform:scale(1.15)}
.sw.sel{border-color:#FFF}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:6px 12px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surf);color:var(--ink);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surf2)}
.btn.pri{background:#6366F1;color:#fff;border-color:#6366F1}
.btn.pri:hover{background:#4F52D4}
.btn.sm{padding:5px 10px;font-size:11px}
.sec-sep{border-top:1px solid var(--border);padding-top:10px;margin-top:2px}
.sec-lbl{font-size:10px;font-weight:600;color:var(--ink3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.hol-list{display:flex;flex-direction:column;gap:3px;max-height:360px;overflow-y:auto}
.hrow{display:flex;align-items:center;gap:7px;padding:5px 9px;background:#1E3028;border-radius:var(--rs)}
.hdate{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--hol-ink);flex-shrink:0}
.hname{flex:1;font-size:12px;color:var(--ink2)}
.hadd{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.hadd input[type=date],.hadd input[type=text]{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surf);color:var(--ink)}
.hadd input[type=date]{flex-shrink:0}
.hadd input[type=text]{flex:1;min-width:110px}
.hadd input:focus{outline:none;border-color:var(--ink2)}
.cfg-inp{font-family:'DM Mono',monospace;font-size:14px;font-weight:600;padding:5px 8px;border:1px solid #484A56;border-radius:var(--rs);background:#30323C;color:var(--ink);width:64px;text-align:center}

/* Resumen */
.resumen-wrap{display:flex;flex-direction:column;gap:14px}
.res-year-title{font-size:15px;font-weight:600;color:var(--ink)}
.res-table{width:100%;border-collapse:collapse;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.res-table th{background:#2A2C36;color:#C8C6CC;border-bottom:1px solid #484A56;font-size:11px;font-weight:600;padding:8px 10px;text-align:left;letter-spacing:.3px}
.res-table th.num{text-align:center}
.res-table td{padding:8px 10px;font-size:12px;border-bottom:1px solid #484A56;background:#363840}
.res-table td.num{text-align:center;font-family:'DM Mono',monospace;font-weight:500}
.res-table tr:last-child td{border-bottom:none}
.res-table tr:hover td{background:#30323C}
.res-person{display:flex;align-items:center;gap:8px}
.year-tabs{display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.year-chip{padding:4px 12px;border-radius:20px;border:1px solid #484A56;background:#30323C;font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .15s}
.year-chip.active{background:#6366F1;color:#fff;border-color:#6366F1}
.year-chip:hover:not(.active){background:#363840}
.loading-res{font-size:13px;color:var(--ink3);padding:20px 0;text-align:center}
.sec-title{font-size:13px;font-weight:600;color:var(--ink);margin-top:4px;margin-bottom:6px}

/* Loading */
.loading{position:fixed;inset:0;background:#2C2E38;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity .4s}
.loading.hidden{opacity:0;pointer-events:none}
.spinner{width:30px;height:30px;border:3px solid #484A56;border-top-color:#818CF8;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--ink2)}
.tip{position:fixed;background:#1A1D2E;color:#fff;font-size:11px;padding:6px 10px;border-radius:var(--rs);pointer-events:none;z-index:9999;display:none;white-space:pre-line;line-height:1.5;box-shadow:var(--shadow);border:1px solid #484A56}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Conectando con Firebase…</div>
</div>

<div class="app">
<nav class="topnav">
  <div class="brand" id="brand">
  <div class="brand-circles">
    <div class="brand-circle" style="background:#E8446A"></div>
    <div class="brand-circle" style="background:#0EA86E"></div>
    <div class="brand-circle" style="background:#6366F1"></div>
  </div>
  <div class="brand-text">
    <strong>Equipo</strong>
    <span>Calendario</span>
  </div>
</div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-cal"  onclick="setTab('cal')">Calendario</button>
    <button class="nav-tab"        id="tab-res"  onclick="setTab('res')">Resumen</button>
    <button class="nav-tab"        id="tab-cfg"  onclick="setTab('cfg')">Configuración</button>
  </div>
  <div class="nav-right">
    <div class="zoom-ctrl" id="zoom-ctrl">
      <button onclick="zoomOut()">−</button>
      <span class="zoom-pct" id="zoom-pct">100%</span>
      <button onclick="zoomIn()">+</button>
    </div>
    <div class="year-nav">
      <button onclick="changeYear(-1)">‹</button>
      <span class="year-lbl" id="ylbl">2026</span>
      <button onclick="changeYear(1)">›</button>
    </div>
    <div class="sync-badge" id="sync-badge"><div class="sync-dot"></div><span id="sync-txt">Conectando</span></div>
  </div>
</nav>

<div class="hintbar" id="hintbar">
  <span id="hint">Selecciona una persona y el modo para marcar días</span>
</div>

<div class="body">
  <aside class="sidebar">
    <div>
      <div class="sb-ttl">Personas</div>
      <div class="plist" id="plist"></div>
    </div>
    <div>
      <div class="sb-ttl">Resumen</div>
      <div class="scards" id="scards"></div>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>
</div>
<div class="tip" id="tip"></div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, getDocs }
                           from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBb7rAjWzXwWpLO4D-_GIf4TWBWyKwA1GM",
  authDomain:"calendario-equipo-1772d.firebaseapp.com",
  projectId:"calendario-equipo-1772d",
  storageBucket:"calendario-equipo-1772d.firebasestorage.app",
  messagingSenderId:"733066238907",
  appId:"1:733066238907:web:02594abb7a4104150e429e"
};
const fbApp=initializeApp(firebaseConfig);
const db=getFirestore(fbApp);

// ── State ──────────────────────────────────────────────────────────
let year=2026, tab='cal', activeP=null, activeMode=null;
let isDrag=false, dragAct=null, saveTimer=null, zoomLevel=100, isRemoteUpdate=false;

// Global settings
let settings = { vacLimit: 22 }; // días de vacaciones por año para todos

const PAL=[
  {id:'c0',color:'#E8446A',light:'#C4405A'},{id:'c1',color:'#E8920A',light:'#C47A1A'},
  {id:'c2',color:'#0EA86E',light:'#1A9060'},{id:'c3',color:'#2878D6',light:'#2060C0'},
  {id:'c4',color:'#7C5FD4',light:'#6048C0'},{id:'c5',color:'#D44A8F',light:'#B83878'},
  {id:'c6',color:'#2BA0B0',light:'#2090A0'},{id:'c7',color:'#C45C1A',light:'#B05018'},
];
const LIB_COLOR='#F59E0B', LIB_LIGHT='#7A4E08';

let persons=[], holidays={}, selColor=PAL[2].id;

// ── Utils ──────────────────────────────────────────────────────────
const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MN3=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DS=['L','M','X','J','V','S','D'];
function dk(y,m,d){return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function dim(y,m){return new Date(y,m,0).getDate();}
function dow1(y,m){let d=new Date(y,m-1,1).getDay();return d===0?6:d-1;}
function ini(n){const p=n.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.substring(0,2).toUpperCase();}
function wd(y,m){let c=0,nd=dim(y,m);for(let d=1;d<=nd;d++){const dow=new Date(y,m-1,d).getDay();if(dow!==0&&dow!==6&&!holidays[dk(y,m,d)])c++;}return c;}
function isHol(k){return !!holidays[k];}
function isWE(k){const d=new Date(k),w=d.getDay();return w===0||w===6;}
// Libranzas generadas = 1 por cada guardia
function libCount(p){ return p.guard.size; }
// Vacaciones usadas
function vacUsed(p){ return p.vac.size; }
// Libranzas usadas (marcadas en calendario)
function libUsed(p){ return p.lib ? p.lib.size : 0; }
// Vacaciones restantes (del cupo)
function vacLeft(p){ return settings.vacLimit - vacUsed(p); }
// Libranzas disponibles (guardias - usadas)
function libLeft(p){ return libCount(p) - libUsed(p); }

// ── Sync ──────────────────────────────────────────────────────────
function setSyncStatus(s,txt){
  document.getElementById('sync-badge').className='sync-badge '+s;
  document.getElementById('sync-txt').textContent=txt;
}
function yearDocId(y){return `year-${y}`;}
function serializeState(){
  return {
    persons:persons.map(p=>({...p,vac:[...p.vac],guard:[...p.guard],lib:[...(p.lib||new Set())]})),
    holidays, settings, updatedAt:Date.now()
  };
}
function deserializeState(data){
  if(!data)return;
  isRemoteUpdate=true;
  if(data.persons) persons=data.persons.map(p=>({...p,vac:new Set(p.vac||[]),guard:new Set(p.guard||[]),lib:new Set(p.lib||[])}));
  if(data.holidays) holidays=data.holidays;
  if(data.settings) settings={...settings,...data.settings};
  isRemoteUpdate=false;
}

async function loadYear(y){
  setSyncStatus('syncing','Cargando…');
  try{
    const snap=await getDoc(doc(db,'calendars',yearDocId(y)));
    if(snap.exists()){
      deserializeState(snap.data());
    } else {
      holidays=defaultHolidays(y);
      if(persons.length===0){
        persons=[
          {id:'p0',name:'Jose Gregorio',color:'#E8446A',light:'#C4405A',vac:new Set(),guard:new Set(),lib:new Set()},
          {id:'p1',name:'Toni Garcia',  color:'#0EA86E',light:'#1A9060',vac:new Set(),guard:new Set(),lib:new Set()},
        ];
      } else {
        persons=persons.map(p=>({...p,vac:new Set(),guard:new Set(),lib:new Set()}));
      }
    }
    subscribeYear(y);
    setSyncStatus('synced','Sincronizado');
  }catch(e){console.error(e);setSyncStatus('error','Sin conexión');}
  document.getElementById('loading').classList.add('hidden');
  render();
}

let unsubscribe=null;
function subscribeYear(y){
  if(unsubscribe)unsubscribe();
  unsubscribe=onSnapshot(doc(db,'calendars',yearDocId(y)),snap=>{
    if(!snap.exists())return;
    const data=snap.data();
    if(data.updatedAt&&data.updatedAt===window.__lastSave)return;
    deserializeState(data);render();setSyncStatus('synced','Sincronizado');
  },()=>setSyncStatus('error','Sin conexión'));
}

function scheduleSave(){
  if(isRemoteUpdate)return;
  setSyncStatus('syncing','Guardando…');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      const state=serializeState();window.__lastSave=state.updatedAt;
      await setDoc(doc(db,'calendars',yearDocId(year)),state);
      setSyncStatus('synced','Sincronizado');
    }catch(e){setSyncStatus('error','Error al guardar');}
  },800);
}

// ── Calendar ──────────────────────────────────────────────────────
function buildMonth(m){
  const card=document.createElement('div');card.className='mcard';
  card.innerHTML=`<div class="mttl">${MN[m-1].toUpperCase()}<span class="mmeta">${wd(year,m)} lab.</span></div><div class="dnames">${DS.map((d,i)=>`<div class="dn${i>=5?' we':''}">${d}</div>`).join('')}</div><div class="dgrid" id="g${m}"></div>`;
  const grid=card.querySelector(`#g${m}`);
  const s0=dow1(year,m),nd=dim(year,m),tot=Math.ceil((s0+nd)/7)*7;
  for(let i=0;i<tot;i++){
    const day=i-s0+1,dow=i%7;
    const cell=document.createElement('div');
    if(day<1||day>nd){cell.className='day out';grid.appendChild(cell);continue;}
    const key=dk(year,m,day);
    const ih=isHol(key),iw=dow>=5;
    const vp=persons.filter(p=>p.vac.has(key));
    const gp=persons.filter(p=>p.guard.has(key));
    const lp=persons.filter(p=>p.lib&&p.lib.has(key));
    let cls='day';if(iw)cls+=' we';if(ih)cls+=' hol';
    cell.className=cls;

    // Background: show vacation/libranza color
    const allVacLib=[...new Set([...vp,...lp])];
    const getBg=p=>lp.includes(p)?LIB_LIGHT:p.light;
    let darkNum=false;
    if(!ih&&!iw&&allVacLib.length===1){
      cell.style.background=getBg(allVacLib[0]);
      darkNum=true;
    } else if(!ih&&!iw&&allVacLib.length===2){
      cell.style.background=`linear-gradient(135deg,${getBg(allVacLib[0])} 50%,${getBg(allVacLib[1])} 50%)`;
      darkNum=true;
    } else if(!ih&&!iw&&allVacLib.length>=3){
      const step=100/allVacLib.length;
      const stops=allVacLib.map((p,i)=>`${getBg(p)} ${i*step}%,${getBg(p)} ${(i+1)*step}%`).join(',');
      cell.style.background=`linear-gradient(135deg,${stops})`;
      darkNum=true;
    }

    const numEl=document.createElement('div');numEl.className='dnum';
    numEl.style.color=darkNum?'#111':'#FFF';
    numEl.textContent=day;cell.appendChild(numEl);
    if(ih){const hl=document.createElement('div');hl.className='hlbl';hl.textContent=holidays[key];cell.appendChild(hl);}

    if(vp.length||gp.length||lp.length){
      const bd=document.createElement('div');bd.className='badges';
      vp.forEach(p=>{
        const b=document.createElement('div');b.className='badge vac';b.style.background=p.color;
        b.textContent=ini(p.name);b.title=p.name+' · Vacaciones';bd.appendChild(b);
      });
      lp.forEach(p=>{
        const b=document.createElement('div');b.className='badge lib';b.style.background=LIB_COLOR;
        b.textContent=ini(p.name);b.title=p.name+' · Libranza';bd.appendChild(b);
      });
      gp.forEach(p=>{
        const b=document.createElement('div');b.className='badge guard';b.style.background=p.color;
        b.title=p.name+' · Guardia';const s=document.createElement('span');s.textContent=ini(p.name);b.appendChild(s);bd.appendChild(b);
      });
      cell.appendChild(bd);
    }

    // Events
    cell.addEventListener('mousedown',e=>{
      if(!activeP||!activeMode)return;
      const p=persons.find(x=>x.id===activeP);if(!p)return;
      if(activeMode==='vac'&&(isHol(key)||isWE(key)))return;
      // Check vac limit before adding
      if(activeMode==='vac'&&!p.vac.has(key)){
        if(vacLeft(p)<=0){
          alert(`⚠️ ${p.name} ya ha alcanzado el límite de ${settings.vacLimit} días de vacaciones.`);
          return;
        }
      }
      // Check libranza limit before adding
      if(activeMode==='lib'&&p.lib&&!p.lib.has(key)){
        if(libLeft(p)<=0){
          alert(`⚠️ ${p.name} no tiene más libranzas disponibles. Tiene ${libCount(p)} guardia(s) y ya ha usado todas las libranzas.`);
          return;
        }
      }
      if(!p.lib)p.lib=new Set();
      isDrag=true;
      const set=activeMode==='vac'?p.vac:activeMode==='guard'?p.guard:p.lib;
      dragAct=set.has(key)?'remove':'add';
      if(dragAct==='add')set.add(key);else set.delete(key);
      renderCalendar();renderSidebar();scheduleSave();e.preventDefault();
    });
    cell.addEventListener('mouseenter',()=>{
      if(!isDrag||!activeP||!activeMode)return;
      const p=persons.find(x=>x.id===activeP);if(!p)return;
      if(activeMode==='vac'&&(isHol(key)||isWE(key)))return;
      if(!p.lib)p.lib=new Set();
      const set=activeMode==='vac'?p.vac:activeMode==='guard'?p.guard:p.lib;
      if(dragAct==='add'){
        if(activeMode==='vac'&&vacLeft(p)<=0)return;
        if(activeMode==='lib'&&libLeft(p)<=0)return;
        set.add(key);
      } else { set.delete(key); }
      renderCalendar();renderSidebar();scheduleSave();
    });
    cell.addEventListener('mousemove',e=>{
      const tip=document.getElementById('tip');
      let txt=`${day} ${MN[m-1]} ${year}`;
      if(ih)txt+=`\n🎉 ${holidays[key]}`;
      if(vp.length)txt+='\n'+vp.map(p=>`${ini(p.name)} · Vacaciones`).join('\n');
      if(lp.length)txt+='\n'+lp.map(p=>`${ini(p.name)} · Libranza`).join('\n');
      if(gp.length)txt+='\n'+gp.map(p=>`${ini(p.name)} · Guardia`).join('\n');
      tip.textContent=txt;tip.style.display='block';
      tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-44)+'px';
    });
    cell.addEventListener('mouseleave',()=>{document.getElementById('tip').style.display='none';});
    grid.appendChild(cell);
  }
  return card;
}
function renderCalendar(){
  const g=document.getElementById('cgrid');if(!g)return;
  g.innerHTML='';for(let m=1;m<=12;m++)g.appendChild(buildMonth(m));
  applyZoom();
}

let resYears=[], resCache={}, resSelectedYear=null;
async function loadResumen(){
  document.getElementById('main').innerHTML=`<div class="loading-res">Cargando…</div>`;
  try{
    const snaps=await getDocs(collection(db,'calendars'));
    resCache={};
    snaps.forEach(s=>{resCache[s.id]=s.data();});
    resCache[yearDocId(year)]={persons:persons.map(p=>({...p,vac:[...p.vac],guard:[...p.guard],lib:[...(p.lib||new Set())]})),holidays,settings};
    resYears=Object.keys(resCache).map(k=>parseInt(k.replace('year-',''))).filter(y=>!isNaN(y)).sort((a,b)=>b-a);
    if(!resSelectedYear||!resYears.includes(resSelectedYear))resSelectedYear=resYears[0]||year;
    renderResumen();
  }catch(e){document.getElementById('main').innerHTML=`<div class="loading-res" style="color:#ef4444">Error cargando datos</div>`;}
}

function renderResumen(){
  const main=document.getElementById('main');
  if(!resYears.length){main.innerHTML=`<div class="loading-res">Sin datos aún.</div>`;return;}
  let html=`<div class="resumen-wrap">`;
  html+=`<div class="year-tabs">`;
  resYears.forEach(y=>{html+=`<div class="year-chip${resSelectedYear===y?' active':''}" onclick="window._resYear(${y})">${y}</div>`;});
  html+=`</div>`;

  const data=resCache[yearDocId(resSelectedYear)];
  if(!data){html+=`<div class="loading-res">Sin datos para ${resSelectedYear}</div></div>`;main.innerHTML=html;return;}
  const ps=data.persons||[], hols=data.holidays||{}, cfg=data.settings||{vacLimit:22};
  const y=resSelectedYear;
  const vacLim=cfg.vacLimit||22;

  const totalLab=Array.from({length:12},(_,mi)=>{
    let c=0,nd=dim(y,mi+1);
    for(let d=1;d<=nd;d++){const dw=new Date(y,mi,d).getDay();if(dw!==0&&dw!==6&&!hols[dk(y,mi+1,d)])c++;}
    return c;
  }).reduce((a,b)=>a+b,0);

  // ── Summary table ──
  html+=`<div class="sec-title">Resumen ${y} · Límite vacaciones: ${vacLim} días</div>`;
  html+=`<table class="res-table"><thead><tr>
    <th>Persona</th>
    <th class="num">Vacaciones</th><th class="num">Restantes</th>
    <th class="num">Guardias</th>
    <th class="num">Libranzas usadas</th><th class="num">Libranzas disp.</th>
    <th class="num">% Vac.</th>
  </tr></thead><tbody>`;
  ps.forEach(p=>{
    const vu=(p.vac||[]).length, gg=(p.guard||[]).length, lu=(p.lib||[]).length;
    const vr=vacLim-vu, lr=gg-lu;
    const pct=vacLim>0?Math.round(vu/vacLim*100):0;
    const vrColor=vr<0?'#ef4444':vr===0?'#f59e0b':p.color;
    html+=`<tr>
      <td><div class="res-person"><div class="av" style="background:${p.color};width:22px;height:22px;font-size:9px">${ini(p.name)}</div>${p.name}</div></td>
      <td class="num" style="color:${p.color};font-weight:600">${vu}</td>
      <td class="num" style="color:${vrColor};font-weight:600">${vr<0?'⚠️ '+vr:vr}</td>
      <td class="num" style="color:${p.color};font-weight:600">${gg}</td>
      <td class="num" style="color:${LIB_COLOR};font-weight:600">${lu}</td>
      <td class="num" style="color:${lr<0?'#ef4444':LIB_COLOR};font-weight:600">${lr}</td>
      <td class="num">${pct}%</td>
    </tr>`;
  });
  html+=`</tbody></table>`;

  // ── Monthly breakdown ──
  html+=`<div class="sec-title">Distribución mensual</div>`;
  html+=`<table class="res-table"><thead><tr><th>Persona</th><th>Tipo</th><th class="num">Total</th>`;
  MN3.forEach(m=>html+=`<th class="num">${m}</th>`);
  html+=`</tr></thead><tbody>`;
  ps.forEach(p=>{
    [['vac',p.color,'● Vac.'],['guard',p.color,'◆ Guardia'],['lib',LIB_COLOR,'◉ Lib.']].forEach(([type,color,label])=>{
      const set=new Set(p[type]||[]);
      const months=Array.from({length:12},(_,mi)=>{
        let c=0,nd=dim(y,mi+1);
        for(let d=1;d<=nd;d++)if(set.has(dk(y,mi+1,d)))c++;
        return c;
      });
      const total=months.reduce((a,b)=>a+b,0);
      if(total===0)return; // skip empty rows
      html+=`<tr><td><div class="res-person"><div class="av" style="background:${color};width:20px;height:20px;font-size:8px">${ini(p.name)}</div>${p.name}</div></td>`;
      html+=`<td style="font-size:11px;color:var(--ink3)">${label}</td>`;
      html+=`<td class="num" style="font-weight:700;color:${color};font-size:13px">${total}</td>`;
      months.forEach(c=>{
        html+=`<td class="num"><div style="min-height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;${c>0?`background:${color};color:#fff`:'color:var(--ink3)'}">${c||'·'}</div></td>`;
      });
      html+=`</tr>`;
    });
  });
  html+=`</tbody></table>`;

  // ── Coincidencias ──
  const coincMap={};
  ps.forEach(p=>{
    ['vac','lib','guard'].forEach(type=>{
      (p[type]||[]).forEach(k=>{
        if(!coincMap[k])coincMap[k]={vac:[],lib:[],guard:[]};
        coincMap[k][type].push(p);
      });
    });
  });
  const coinc=Object.entries(coincMap)
    .filter(([,v])=>v.vac.length+v.lib.length>1||(v.vac.length+v.lib.length>=1&&v.guard.length>=1))
    .sort((a,b)=>a[0].localeCompare(b[0]));

  html+=`<div class="sec-title">Coincidencias ${y}</div>`;
  if(!coinc.length){
    html+=`<div style="font-size:13px;color:var(--ink3);padding:10px 0">No hay coincidencias.</div>`;
  } else {
    html+=`<table class="res-table"><thead><tr><th>Fecha</th><th>Vacaciones</th><th>Libranzas</th><th>Guardia</th></tr></thead><tbody>`;
    coinc.forEach(([k,v])=>{
      const [,m,d]=k.split('-');
      const badge=(p,cls,bg)=>`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:6px"><span style="width:16px;height:16px;border-radius:${cls==='vac'?'50%':'4px'};background:${bg};display:inline-flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff">${ini(p.name)}</span>${p.name}</span>`;
      html+=`<tr>
        <td style="font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--ink2)">${d}/${m}${hols[k]?' 🎉':''}</td>
        <td>${v.vac.map(p=>badge(p,'vac',p.color)).join('')||'—'}</td>
        <td>${v.lib.map(p=>badge(p,'lib',LIB_COLOR)).join('')||'—'}</td>
        <td>${v.guard.map(p=>badge(p,'guard',p.color)).join('')||'—'}</td>
      </tr>`;
    });
    html+=`</tbody></table>`;
  }
  html+=`</div>`;
  main.innerHTML=html;
}

      <input class="name-inp" value="${p.name}" onchange="window._renamePerson('${p.id}',this.value)">
      <div style="display:flex;gap:10px;align-items:center;flex-shrink:0">
        <span style="font-size:12px;font-weight:600;color:${vl<0?'#ef4444':'#C8C6CC'};font-family:'DM Sans',sans-serif;white-space:nowrap">${vu}<span style="font-size:10px;opacity:.6">/${settings.vacLimit} vac</span></span>
        <span style="font-size:12px;font-weight:600;color:${LIB_COLOR};font-family:'DM Sans',sans-serif;white-space:nowrap">${ll} <span style="font-size:10px;font-weight:400">lib. disp.</span></span>
      </div>
      <button class="del-btn" onclick="window._delPerson('${p.id}')">×</button>`;
    el.appendChild(row);
  });
}
function renderCfgH(){
  const el=document.getElementById('cfgh');if(!el)return;el.innerHTML='';
  Object.entries(holidays).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,name])=>{
    const [,m,d]=date.split('-');
    const row=document.createElement('div');row.className='hrow';
    row.innerHTML=`<span class="hdate">${d}/${m}</span><span class="hname">${name}</span><button class="del-btn" onclick="window._delHoliday('${date}')">×</button>`;
    el.appendChild(row);
  });
}
function renderSws(){
  const el=document.getElementById('sws');if(!el)return;el.innerHTML='';
  PAL.forEach(p=>{
    const s=document.createElement('div');s.className='sw'+(selColor===p.id?' sel':'');
    s.style.background=p.color;s.onclick=()=>{selColor=p.id;renderSws();};el.appendChild(s);
  });
}

// ── CRUD ──────────────────────────────────────────────────────────
window._setVacLimit=v=>{
  const n=parseInt(v);if(isNaN(n)||n<1)return;
  settings.vacLimit=n;scheduleSave();renderSidebar();
};
window._addPerson=()=>{
  const name=document.getElementById('nname').value.trim();if(!name)return;
  const pal=PAL.find(p=>p.id===selColor)||PAL[0];
  persons.push({id:'p'+Date.now(),name,color:pal.color,light:pal.light,vac:new Set(),guard:new Set(),lib:new Set()});
  document.getElementById('nname').value='';
  selColor=PAL[persons.length%PAL.length].id;
  scheduleSave();render();
};
window._delPerson=id=>{
  if(!confirm('¿Eliminar esta persona?'))return;
  persons=persons.filter(p=>p.id!==id);
  if(activeP===id){activeP=null;activeMode=null;}
  scheduleSave();render();
};
window._renamePerson=(id,name)=>{
  const p=persons.find(x=>x.id===id);if(p&&name.trim())p.name=name.trim();
  scheduleSave();renderSidebar();
};
window._addHoliday=()=>{
  const date=document.getElementById('hdate').value;
  const name=document.getElementById('hname').value.trim()||'Festivo';
  if(!date)return;holidays[date]=name;
  document.getElementById('hname').value='';
  scheduleSave();render();
};
window._delHoliday=date=>{delete holidays[date];scheduleSave();render();};

// ── Tab / Year ────────────────────────────────────────────────────
window.setTab=t=>{
  tab=t;
  ['cal','res','cfg'].forEach(id=>{
    document.getElementById('tab-'+id).className='nav-tab'+(t===id?' active':'');
  });
  document.getElementById('hintbar').style.display=t==='cal'?'flex':'none';
  document.getElementById('zoom-ctrl').style.display=t==='cal'?'flex':'none';
  render();
};
window.changeYear=d=>{year+=d;document.getElementById('ylbl').textContent=year;loadYear(year).then ? loadYear(year) : loadYear(year); setTimeout(updateBrandCircles, 2000);};

// ── Render ────────────────────────────────────────────────────────
function render(){
  renderSidebar();updateHint();updateBrandCircles();
  const main=document.getElementById('main');
  if(tab==='cal'){
    main.innerHTML='<div class="cal-zoom-wrap" id="cal-zoom-wrap"><div class="cal-grid" id="cgrid"></div></div>';
    renderCalendar();
  } else if(tab==='res'){
    loadResumen();
  } else {
    renderConfig();
  }
}

document.addEventListener('mouseup',()=>{isDrag=false;dragAct=null;});
function updateBrandCircles(){
  // Logo always fixed — 3 circles same colors regardless of team
  updateFavicon(['#E8446A','#0EA86E','#6366F1']);
}
function updateFavicon(colors){
  const c=colors.length>0?colors[0]:'#E8446A';
  const c2=colors.length>1?colors[1]:'#0EA86E';
  const c3=colors.length>2?colors[2]:'#6366F1';
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <rect width="64" height="64" rx="14" fill="#1A1D2E"/>
    <circle cx="18" cy="32" r="14" fill="${c}"/>
    <circle cx="32" cy="32" r="14" fill="${c2}" stroke="#1A1D2E" stroke-width="2"/>
    <circle cx="46" cy="32" r="14" fill="${c3}" stroke="#1A1D2E" stroke-width="2"/>
  </svg>`;
  const b64=btoa(svg);
  let link=document.querySelector("link[rel='icon']");
  if(!link){link=document.createElement('link');link.rel='icon';document.head.appendChild(link);}
  link.type='image/svg+xml';
  link.href='data:image/svg+xml;base64,'+b64;
}
document.getElementById('zoom-ctrl').style.display='flex';
loadYear(year).then ? loadYear(year) : loadYear(year); setTimeout(updateBrandCircles, 2000);
</script>
</body>
</html>
